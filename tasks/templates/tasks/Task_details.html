<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Details - YallaDo</title>
    <link rel="stylesheet" href="Task_details.css">
    <script src="Task_details.js" defer></script>
</head>
<body>

<nav>
    <div class="nav-left">
        <a href="Home.html" class="y-icon">Y</a>
        <a href="Home.html" class="logo-brand">YallaDo</a>
    </div>
    
    <div class="nav-center" id="nav-center"></div>

    <div class="nav-right">
        <a href="Home.html" class="logout-box">Logout</a>
    </div>
</nav>

<main>
    <h2>📋 Task Details</h2>
    <p class="page-subtitle">View and manage your ongoing tasks</p>

    <template id="task-card-template">
        <div class="task-card">
            <div class="header">
                <h3 class="task-title"></h3>
                <span class="task-status ongoing">🔄 Ongoing</span>
            </div>
            <div class="task-details-grid">
                <div class="detail-item">
                    <span class="detail-categoty">Task ID:</span>
                    <span class="detail-value task-id-val"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-categoty">Teacher:</span>
                    <span class="detail-value task-teacher-val"></span>
                </div>
                <div class="detail-item priority-container">
                    <span class="detail-categoty">Priority:</span>
                </div>
                <div class="detail-item">
                    <span class="detail-categoty">Status:</span>
                    <span class="detail-value">Ongoing</span>
                </div>
                <div class="detail-item">
                    <span class="detail-categoty">Created by:</span>
                    <span class="detail-value task-creator-val"></span>
                </div>
    
                <div class="detail-item task-desc-container hidden" style="grid-column:1/-1;">
                    <span class="detail-categoty">Description:</span>
                    <span class="detail-value task-desc-val"></span>
                </div>
            </div>
            <div class="mark-done">
                <button class="btn-complete">✓ Mark Task as Completed</button>
            </div>
        </div>
    </template>

    <template id="empty-state-template">
        <div id="td-empty">
            <div class="td-empty-icon">🎉</div>
            <p class="td-empty-title">All tasks completed!</p>
            <p class="td-empty-text">Great work. Head to Completed Tasks to review them.</p>
            <a href="Completed_tasks.html" class="td-empty-link">View Completed Tasks →</a>
        </div>
    </template>
</main>

<footer>
    <h3>Assign smart Not hard</h3>
    <hr>
    <p>
        <a href="About_us.html">About Us</a>
        <a href="Contact.html">Contact Us</a>
    </p>
    <p>&copy; 2026 All Rights Reserved.</p>
</footer>

</body>
</html>
