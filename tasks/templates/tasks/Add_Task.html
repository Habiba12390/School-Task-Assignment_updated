{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <title>Add New Task - YallaDo</title>
    <link rel="stylesheet" href="{% static 'css/AddTask.css' %}">
</head>

<body>

    <nav>
        <div class="nav-left">
            <a href="/" class="y-icon">Y</a>
            <a href="/" class="logo-brand">YallaDo</a>
        </div>
        <div class="nav-center" id="nav-center"></div>
        <div class="nav-right">
            <a href="/" class="logout-box">Logout</a>
        </div>
    </nav>

    <form id="addTaskForm">
        <label class="large-label">Add New Task</label>

        <label for="task_title">Task Title:</label>
        <input type="text" id="task_title" name="task_title" required placeholder="e.g., Grade Papers"><br>

        <label for="teacher_name">Teacher Name:</label>
        <input type="text" id="teacher_name" name="teacher_name" required placeholder="e.g., Mr. Ahmed"><br>

        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" required placeholder="e.g., Mathematics"><br>

        <label for="grade">Grade:</label>
        <input type="text" id="grade" name="grade" required placeholder="e.g., Grade 7"><br>

        <label>Priority:</label>
        <div class="priority-group">
            <input type="radio" id="low" name="priority" value="low" required>
            <label for="low">Low</label>
            <input type="radio" id="medium" name="priority" value="medium">
            <label for="medium">Medium</label>
            <input type="radio" id="high" name="priority" value="high">
            <label for="high">High</label>
        </div>

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="5" cols="60" required placeholder="Provide detailed instructions..."></textarea><br><br>

        <label for="created_by">Created By:</label>
        <input type="text" id="created_by" name="created_by" required><br>

        <div class="button-container">
            <button type="submit"> ✔ Save </button>
            <button type="reset"> ↻ Reset </button>
        </div>
    </form>

    <footer>
        <h3>Assign smart Not hard</h3>
        <hr>
        <p>
            <a href="/contact/">About Us</a>
            <a href="/contact/">Contact Us</a>
        </p>
        <p>&copy; 2026 All Rights Reserved.</p>
    </footer>

    <script>
        const LOGGED_NAME = "{{ request.session.user_name|default:'' }}";
        const LOGGED_ROLE = "{{ request.session.user_role|default:'' }}";
    </script>
    <script src="{% static 'js/AddTask.js' %}" defer></script>
</body>
</html>
