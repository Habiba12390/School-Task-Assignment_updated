<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - YallaDo</title>
    <link rel="stylesheet" href="Teacher_dashboard.css">
    <script src="Teacher_dashboard.js" defer></script>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="Home.html" class="y-icon">Y</a>
            <a href="Home.html" class="logo-brand">YallaDo</a>
        </div>

        <div class="nav-center" id="nav-center">
        </div>

        <div class="nav-right">
            <a href="Home.html" class="logout-box">Logout</a>
        </div>
    </nav>

    <main>
        <h2>Hello, Teacher! 👋</h2>
        <p>Here are all tasks assigned to you:</p>

        <form method="get">
            <input type="search" id="search" name="search" placeholder="Search by (Priority)..."
                aria-label="Search through this site content" list="options">
            <button type="submit">Submit</button>

            <datalist id="options">
                <option value="High"></option>
                <option value="Medium"></option>
                <option value="Low"></option>
            </datalist>
        </form>

        <div id="task-list-container" class="task-list-container"></div>
    </main>

    <footer>
        <h3>Assign smart Not hard</h3>
        <hr>
        <p>
            <a href="About_us.html">About Us</a>
            <a href="Contact.html">Contact Us</a>
        </p>
        <p>&copy; 2026 All Rights Reserved.</p>
    </footer>
</body>
</html>
