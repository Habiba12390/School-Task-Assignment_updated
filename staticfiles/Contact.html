<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="Contact.css">
    <script src="Contact.js" defer></script>
    <title>Contact Us - School Task Assignment</title>
</head>
<body>

    <header>
        <nav>
                <div class="nav-left">
                    <a href="Home.html" class="y-icon">Y</a>
                    <a href="Home.html" class="logo-brand">YallaDo</a>
                </div>
                
                   <div class="nav-right">
            <a href="Home.html" >Home</a>
        </div>
            

   
        </nav>
    </header>

    <main>
        <h2>Contact Us</h2>
        <p>Do you have an inquiry or a problem with the system? Send us a message below.</p>

        <form action="Home.html">
            <p>
                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required size="40">
            </p>
            <p>
                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email" required size="40">
            </p>
            <p>
                <label for="message">Your Message:</label><br>
                <textarea id="message" name="message" rows="6" cols="42" placeholder="Write your message here..." required></textarea>
            </p>
            <p>
                <button type="submit">Send Message</button>
                <button type="reset">Clear Form</button>
            </p>
        </form>
        <br><br><br><br>
    </main>

    <footer>
            <h3>Assign smart Not hard</h3>
            <hr>
            <p>
                <a href="About_us.html">About Us</a>
                <a href="Contact.html">Contact Us</a>
            </p>
            <p>&copy; 2026 All Rights Reserved.</p>
    </footer>

</body>
</html>
