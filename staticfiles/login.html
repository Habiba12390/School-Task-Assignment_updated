{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - YallaDo</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <header>
        <a href="/" class="logo-container">
            <div class="logo-icon">Y</div>
            <span class="logo-text">YallaDo</span>
        </a>
        <nav class="nav_right">
            <a href="/" class="home">Home</a>
            <a href="/signup/" class="btn-blue">Sign Up</a>
        </nav>
    </header>

    <section class="login-container">
        <div class="card">
            <h2>Welcome back</h2>
            <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Enter your ID and password</p>

            <label for="user_email">Email Address</label>
            <input type="email" id="user_email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>

            <button onclick="handleLogin()">Login</button>

            <p style="margin-top: 20px; font-size: 14px;">
                Don't have an account? <a href="/signup/" style="color: #2563eb; text-decoration: none;">Sign up here</a>
            </p>
        </div>
    </section>

    <footer>
        <h3>Assign smart Not hard</h3>
        <hr>
        <p>
            <a href="/about/">About Us</a>
            <a href="/contact/">Contact Us</a>
        </p>
        <p>&copy; 2026 All Rights Reserved.</p>
    </footer>
    <script src="{% static 'Login.js' %}" defer></script>
</body>
</html>
