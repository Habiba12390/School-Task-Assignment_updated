<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Task - YallaDo</title>
    <link rel="stylesheet" href="AddTask.css">
    <script src="AddTask.js" defer></script>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="Home.html" class="y-icon">Y</a>
            <a href="Home.html" class="logo-brand">YallaDo</a>
        </div>

        <div class="nav-center" id="nav-center">
        </div>

        <div class="nav-right">
            <a href="Home.html" class="logout-box">Logout</a>
        </div>
    </nav>

    <form id="addTaskForm">
        <label class="large-label">Add New Task</label>

        <label for="task_ID">Task ID:</label>
        <input type="text" id="task_ID" name="task_ID" required placeholder="e.g., TASK-001"><br>

        <label for="task_title">Task Title:</label>
        <input type="text" id="task_title" name="task_title" required placeholder="e.g., Grade Papers"><br>

        <label for="teacher_name">Teacher Name:</label>
        <input type="text" id="teacher_name" name="teacher_name" required placeholder="e.g., Mr. Ahmed"><br>

        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" required placeholder="e.g., Mathematics"><br>

        <label for="grade">Grade:</label>
        <input type="text" id="grade" name="grade" required placeholder="e.g., Grade 7"><br>

        <label>Priority:</label>
        <div class="priority-group">
            <input type="radio" id="low" name="priority" value="low" required>
            <label for="low">Low</label>

            <input type="radio" id="medium" name="priority" value="medium" required>
            <label for="medium">Medium</label>

            <input type="radio" id="high" name="priority" value="high" required>
            <label for="high">High</label>
        </div>

        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="5" cols="60" required placeholder="Provide detailed instructions..."></textarea><br><br>

        <label for="created_by">Created By:</label>
        <input type="text" id="created_by" name="created_by" required placeholder="e.g., Basma Khaled"><br>

        <div class="button-container">
            <button type="submit"> ✔ Save </button>
            <button type="reset"> ↻ Reset </button>
        </div>
    </form>

    <footer>
        <h3>Assign smart Not hard</h3>
        <hr>
        <p>
            <a href="About_us.html">About Us</a>
            <a href="Contact.html">Contact Us</a>
        </p>
        <p>&copy; 2026 All Rights Reserved.</p>
    </footer>
</body>
</html>
