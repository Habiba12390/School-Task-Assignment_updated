{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - YallaDo</title>
    <link rel="stylesheet" href="{% static 'Admin_dashboard.css' %}">
</head>
<body>
    <header>
        <a href="/home/" class="logo-container">
            <div class="logo-icon">Y</div>
            <span class="logo-text">YallaDo</span>
        </a>

        <nav class="nav-center" id="nav-center">
            </nav>

        <div class="nav-right">
            <a href="/logout/" class="logout-box">Logout</a>
        </div>
    </header>
    {% csrf_token %}
    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h2>Welcome, Admin!</h2>
                <p style="color: #666;">Manage and oversee all school tasks.</p>
            </div>
            <a href="/api/tasks/add-task/">
            <button class="creat-box">+ Create New Task</button>
            </a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Task Title</th>
                        <th>Assigned Teacher</th>
                        <th>Priority</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="task-table-body"></tbody>
            </table>
        </div>
    </main>

    <footer>
        <h3>Assign smart Not hard</h3>
        <hr>
        <p>
            <a href="/about/">About Us</a>
            <a href="/contact/">Contact Us</a>
        </p>
        <p>&copy; 2026 All Rights Reserved.</p>
    </footer>

    <script src="{% static 'Admin_dashboard.js' %}"></script>
</body>
</html>
